name: HabitTracker
options:
  bundleIdPrefix: com.heejung
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  HabitTracker:
    type: application
    platform: iOS
    sources:
      - HabitTracker
    scheme:
      testTargets:
        - HabitTrackerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heejung.HabitTracker
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
  HabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HabitTrackerTests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
